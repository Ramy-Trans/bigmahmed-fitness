kind = "web"
previewPath = "/"
title = "Mohamed Ahmed Fitness Coaching"
version = "1.0.0"
id = "artifacts/fitness-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19868

[services.development]
run = "pnpm --filter @workspace/fitness-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fitness-website", "run", "build" ]
publicDir = "artifacts/fitness-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19868"
BASE_PATH = "/"
