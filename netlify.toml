[build]
  base    = "."
  command = "pnpm install && PORT=3000 BASE_PATH=/ pnpm --filter @workspace/fitness-website build"
  publish = "artifacts/fitness-website/dist/public"

[build.environment]
  NODE_VERSION    = "20"
  PNPM_VERSION    = "10"
  NODE_ENV        = "production"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
