openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead capture operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /leads:
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a new lead
      description: Save a new lead from the contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadRequest"
      responses:
        "201":
          description: Lead created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getLeads
      tags: [leads]
      summary: Get all leads
      description: Retrieve all leads (admin)
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CreateLeadRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        age:
          type: string
          minLength: 1
        goal:
          type: string
          minLength: 1
        whatsapp:
          type: string
          minLength: 1
      required:
        - name
        - age
        - goal
        - whatsapp
    Lead:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: string
        goal:
          type: string
        whatsapp:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - age
        - goal
        - whatsapp
        - createdAt
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
